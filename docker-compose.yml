services:
  edgechat:
    build: .
    ports:
      - "8788:8787"
    environment:
      - NODE_ENV=production
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
    restart: unless-stopped
    volumes:
      - wrangler-state:/app/.wrangler/state
    networks:
      - edgechat-network

networks:
  edgechat-network:
    driver: bridge

volumes:
  wrangler-state:
